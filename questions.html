<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz - EduLearn Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.05);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { background: #f5f7ff; }

        /* Navigation */
        .navbar { background: var(--white); box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 1000; padding: 12px 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: var(--gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 1.3rem; color: white; }
        .logo h1 { font-size: 1.3rem; font-weight: 700; color: var(--dark); }
        .logo span { color: var(--primary); }
        .nav-menu { display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-menu a { text-decoration: none; color: var(--gray); padding: 8px 16px; border-radius: 8px; transition: all 0.3s; font-weight: 500; font-size: 0.9rem; }
        .nav-menu a:hover, .nav-menu a.active { background: rgba(67,97,238,0.1); color: var(--primary); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1.2rem; transition: all 0.3s; }
        .logout-btn:hover { color: var(--danger); }

        /* Menu Mobile */
        .mobile-menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; color: var(--dark); cursor: pointer; padding: 8px; border-radius: 8px; z-index: 1001; }
        .mobile-nav { position: fixed; top: 0; right: -100%; width: 80%; max-width: 320px; height: 100vh; background: var(--white); box-shadow: -5px 0 30px rgba(0,0,0,0.1); z-index: 1000; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 80px 20px 20px; overflow-y: auto; }
        .mobile-nav.open { right: 0; }
        .mobile-nav a, .mobile-nav button { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: var(--dark); font-weight: 500; width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-size: 1rem; }
        .mobile-nav a:hover, .mobile-nav button:hover { background: rgba(67,97,238,0.1); color: var(--primary); }
        .mobile-nav i { width: 24px; }

        /* Main Content */
        .main-content { padding: 30px 0; }

        /* Page Header */
        .page-header {
            background: var(--gradient);
            border-radius: 24px;
            padding: 35px 30px;
            margin-bottom: 30px;
            color: white;
        }
        .page-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .page-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Subjects Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .subject-card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-light);
        }
        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-color: transparent;
        }
        .subject-icon {
            width: 70px;
            height: 70px;
            background: rgba(67,97,238,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .subject-icon i { font-size: 2rem; color: var(--primary); }
        .subject-card h3 { font-size: 1.2rem; margin-bottom: 10px; color: var(--dark); }
        .subject-card p { color: var(--gray); font-size: 0.85rem; margin-bottom: 5px; }
        .subject-stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--gray-light); display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray); }

        /* Quiz Container */
        .quiz-container {
            background: var(--white);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        .quiz-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--gray-light); }
        .quiz-header h2 { font-size: 1.8rem; color: var(--dark); margin-bottom: 10px; }
        .quiz-meta { display: flex; justify-content: center; gap: 30px; color: var(--gray); font-size: 0.9rem; flex-wrap: wrap; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; padding: 20px; background: var(--light); border-radius: 16px; color: var(--dark); line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .option { display: flex; align-items: center; gap: 12px; padding: 15px; border: 2px solid var(--gray-light); border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .option:hover { border-color: var(--primary); background: rgba(67,97,238,0.05); }
        .option.selected { border-color: var(--primary); background: rgba(67,97,238,0.1); }
        .option input { width: 18px; height: 18px; cursor: pointer; }
        .option label { flex: 1; cursor: pointer; font-size: 1rem; }

        /* Quiz Navigation */
        .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--gray-light); }
        .progress-bar { flex: 1; height: 8px; background: var(--light); border-radius: 4px; margin: 0 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-secondary { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover { background: rgba(67,97,238,0.1); }

        /* Results */
        .results { text-align: center; padding: 40px; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; position: relative; }
        .score-circle::before { content: ''; position: absolute; width: 120px; height: 120px; background: white; border-radius: 50%; }
        .score-text { position: relative; font-size: 2rem; font-weight: bold; color: var(--primary); }
        .results-actions { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }

        /* Correction Details */
        .correction-details { margin-top: 30px; padding: 25px; background: var(--light); border-radius: 20px; }
        .correction-item { padding: 20px; margin-bottom: 15px; background: var(--white); border-radius: 12px; border-left: 4px solid var(--gray); }
        .correction-item.correct { border-left-color: var(--success); }
        .correction-item.wrong { border-left-color: var(--danger); }
        .correction-question { font-weight: 600; margin-bottom: 10px; color: var(--dark); }
        .correction-answer { color: var(--gray); font-size: 0.9rem; margin-bottom: 5px; }
        .correction-good { color: var(--success); font-weight: 500; }
        .correction-bad { color: var(--danger); font-weight: 500; }

        /* History Section */
        .history-section { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-sm); margin-top: 30px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--gray-light); }
        .history-item:last-child { border-bottom: none; }
        .history-score { font-weight: bold; padding: 4px 12px; border-radius: 20px; }
        .history-score.good { background: rgba(46,204,113,0.2); color: var(--success); }
        .history-score.medium { background: rgba(243,156,18,0.2); color: var(--warning); }
        .history-score.bad { background: rgba(231,76,60,0.2); color: var(--danger); }

        /* Back Button */
        .back-button { display: inline-flex; align-items: center; gap: 10px; background: var(--white); color: var(--primary); padding: 12px 24px; border-radius: 50px; text-decoration: none; font-weight: 500; transition: all 0.3s; margin-top: 20px; box-shadow: var(--shadow-sm); }
        .back-button:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        /* Message */
        .message { position: fixed; bottom: 20px; right: 20px; background: var(--dark); color: white; padding: 12px 20px; border-radius: 8px; display: none; z-index: 2000; animation: slideIn 0.3s ease; }
        .message.show { display: block; }
        .message.success { background: var(--success); }
        .message.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) { 
            .nav-menu { display: none !important; } 
            .user-info { display: none !important; } 
            .mobile-menu-toggle { display: block; } 
            .subjects-grid { grid-template-columns: 1fr; }
            .quiz-nav { flex-direction: column; gap: 15px; }
            .progress-bar { margin: 10px 0; width: 100%; }
            .results-actions { flex-direction: column; }
            .page-header { padding: 25px 20px; }
            .page-header h1 { font-size: 1.4rem; }
            .quiz-header h2 { font-size: 1.4rem; }
            .question { font-size: 1rem; }
        }
        @media (min-width: 769px) { .mobile-nav, .mobile-menu-toggle { display: none; } .nav-menu { display: flex !important; } .user-info { display: flex !important; } }
    </style>
</head>

        // Variables du quiz
        let currentSubject = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let quizCompleted = false;
        let quizScore = 0;

        function showSubjects() {
            const container = document.getElementById('quiz-content');
            const subjects = Object.keys(questionsBank);
            const history = getQuizHistory();
            
            container.innerHTML = `
                <div class="page-header">
                    <h1><i class="fas fa-question-circle"></i> Quiz & Évaluations</h1>
                    <p>Testez vos connaissances par matière - 10 questions aléatoires par session</p>
                </div>
                <div class="subjects-grid">
                    ${subjects.map(s => `
                        <div class="subject-card" onclick="startQuiz('${s}')">
                            <div class="subject-icon"><i class="fas ${questionsBank[s].icon}" style="color: ${questionsBank[s].color}"></i></div>
                            <h3>${s}</h3>
                            <p>${questionsBank[s].questions.length} questions</p>
                            <div class="subject-stats"><span><i class="fas fa-clock"></i> 15 min</span><span><i class="fas fa-random"></i> Aléatoire</span></div>
                        </div>
                    `).join('')}
                </div>
                <div class="history-section">
                    <h3><i class="fas fa-history"></i> Historique des quiz</h3>
                    <div id="history-list">${renderHistory(history)}</div>
                </div>
            `;
        }

        function getQuizHistory() {
            try {
                return JSON.parse(localStorage.getItem(`quiz_${currentUser.id}`)) || [];
            } catch(e) { return []; }
        }

        function saveQuizHistory(history) {
            localStorage.setItem(`quiz_${currentUser.id}`, JSON.stringify(history));
        }

        function renderHistory(history) {
            if (history.length === 0) return '<div style="text-align:center;padding:20px;color:var(--gray);">Aucun quiz complété</div>';
            return history.slice(-8).reverse().map(h => {
                let scoreClass = 'bad';
                if (h.score >= 70) scoreClass = 'good';
                else if (h.score >= 50) scoreClass = 'medium';
                return `<div class="history-item"><div><strong>${h.subject}</strong><div style="font-size:0.8rem;color:var(--gray);">${new Date(h.date).toLocaleDateString('fr-FR')}</div></div><div class="history-score ${scoreClass}">${h.score}%</div></div>`;
            }).join('');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(subject) {
            currentSubject = subject;
            currentQuestions = shuffleArray([...questionsBank[subject].questions]).slice(0, 10);
            currentIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            quizCompleted = false;
            renderQuiz();
        }

        function renderQuiz() {
            if (quizCompleted) { showResults(); return; }
            
            const q = currentQuestions[currentIndex];
            const currentAnswer = userAnswers[currentIndex];
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            
            const container = document.getElementById('quiz-content');
            container.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header">
                        <h2>${currentSubject}</h2>
                        <div class="quiz-meta"><span><i class="fas fa-question-circle"></i> Question ${currentIndex+1}/${currentQuestions.length}</span><span><i class="fas fa-check-circle"></i> ${userAnswers.filter(a => a !== null).length} répondues</span></div>
                    </div>
                    <div class="question">${q.texte}</div>
                    <div class="options">${q.options.map((opt, i) => `<div class="option ${currentAnswer === i ? 'selected' : ''}" onclick="selectAnswer(${i})"><input type="radio" name="question" ${currentAnswer === i ? 'checked' : ''}><label>${opt}</label></div>`).join('')}</div>
                    <div class="quiz-nav"><button class="btn btn-secondary" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>Précédent</button><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div><button class="btn btn-primary" onclick="nextQuestion()">${currentIndex === currentQuestions.length-1 ? 'Terminer' : 'Suivant'}</button></div>
                </div>
            `;
        }

        function selectAnswer(index) { userAnswers[currentIndex] = index; renderQuiz(); }
        function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuiz(); } }
        
        function nextQuestion() {
            if (userAnswers[currentIndex] === null) { alert('Veuillez sélectionner une réponse'); return; }
            if (currentIndex === currentQuestions.length - 1) completeQuiz();
            else { currentIndex++; renderQuiz(); }
        }

        function completeQuiz() {
            let correct = 0;
            const correction = [];
            currentQuestions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.correct;
                if (isCorrect) correct++;
                correction.push({ question: q.texte, userAnswer: q.options[userAnswers[i]], correctAnswer: q.options[q.correct], isCorrect, explanation: q.explication });
            });
            quizScore = Math.round((correct / currentQuestions.length) * 100);
            
            const history = getQuizHistory();
            history.push({ subject: currentSubject, score: quizScore, correct: correct, total: currentQuestions.length, date: new Date().toISOString() });
            saveQuizHistory(history);
            
            quizCompleted = true;
            showResults(correct, correction);
        }

        function showResults(correct, correction) {
            const angle = (quizScore / 100) * 360;
            let message = quizScore >= 80 ? "Excellent ! 🎉" : quizScore >= 60 ? "Très bien ! 👍" : quizScore >= 40 ? "Continuez vos révisions 📚" : "Besoin de révision 💪";
            
            const correctionsHtml = correction.map(c => `
                <div class="correction-item ${c.isCorrect ? 'correct' : 'wrong'}">
                    <div class="correction-question">${c.question}</div>
                    <div class="correction-answer"><span class="${c.isCorrect ? 'correction-good' : 'correction-bad'}">${c.isCorrect ? '✓ Votre réponse: ' : '✗ Votre réponse: '}</span> ${c.userAnswer}</div>
                    <div class="correction-answer"><span class="correction-good">✓ Bonne réponse: </span> ${c.correctAnswer}</div>
                    <div class="correction-answer" style="margin-top:8px;color:var(--info);"><i class="fas fa-info-circle"></i> ${c.explication}</div>
                </div>
            `).join('');
            
            const container = document.getElementById('quiz-content');
            container.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header"><h2>Résultats du quiz</h2><p>${currentSubject}</p></div>
                    <div class="results"><div class="score-circle" style="background: conic-gradient(var(--primary) ${angle}deg, var(--light) ${angle}deg)"><div class="score-text">${quizScore}%</div></div><h3>${correct}/${currentQuestions.length} réponses correctes</h3><p>${message}</p><div class="results-actions"><button class="btn btn-primary" onclick="startQuiz('${currentSubject}')"><i class="fas fa-redo"></i> Refaire</button><button class="btn btn-secondary" onclick="showSubjects()"><i class="fas fa-th-large"></i> Autres matières</button></div></div>
                    <div class="correction-details"><h3><i class="fas fa-graduation-cap"></i> Corrigé détaillé</h3>${correctionsHtml}</div>
                </div>
                <div class="history-section"><h3><i class="fas fa-history"></i> Historique des quiz</h3><div id="history-list">${renderHistory(getQuizHistory())}</div></div>
            `;
        }

        window.startQuiz = startQuiz;
        window.selectAnswer = selectAnswer;
        window.prevQuestion = prevQuestion;
        window.nextQuestion = nextQuestion;
        window.showSubjects = showSubjects;

        // Menu responsive
        const toggleBtn = document.getElementById('mobile-toggle');
        const mobileNav = document.getElementById('mobile-nav');
        if (toggleBtn && mobileNav) {
            toggleBtn.onclick = () => { mobileNav.classList.toggle('open'); toggleBtn.classList.toggle('active'); document.body.style.overflow = mobileNav.classList.contains('open') ? 'hidden' : ''; };
            document.querySelectorAll('.mobile-nav a, .mobile-nav button').forEach(link => { link.onclick = () => { mobileNav.classList.remove('open'); toggleBtn.classList.remove('active'); document.body.style.overflow = ''; }; });
            document.addEventListener('click', (e) => { if (!mobileNav.contains(e.target) && !toggleBtn.contains(e.target) && mobileNav.classList.contains('open')) { mobileNav.classList.remove('open'); toggleBtn.classList.remove('active'); document.body.style.overflow = ''; } });
        }
        document.getElementById('mobile-logout')?.addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; });
        document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; };

        showSubjects();
    </script>
